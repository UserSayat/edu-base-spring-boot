version: '3.8'

services:
  app:
    build: .
    container_name: edu-base-app
    ports:
      - "8080:8080"
    environment:
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - FLYWAY_ENABLED=true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - edu-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: edu-mysql-container
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=mydb
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 10s
      retries: 10
    networks:
      - edu-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  edu-network:
    driver: bridge