spring:
  application:
    name: edu-base
  datasource:
    url: jdbc:mysql://localhost:3307/mydb
    username: user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  server:
    port: 8080
